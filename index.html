<!DOCTYPE html>
<head>
  <title>Rock Paper Scissor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <p class="title"> Rock Paper Scissor </p>

    <button class="icons" onclick="
      playGame('rock');
      "><img class="img-icons" src= "images/rock-emoji.png"/> 
    </button>

    <button class="icons" onclick="
      playGame('paper');
      "><img class="img-icons" src = "images/paper-emoji.png"/> 
    </button>

    <button class="icons" onclick="
      playGame('scissor');
      "><img class="img-icons" src = "images/scissor-emoji.png"/>
    </button>


    <p class="js-result result"></p>
    <p class="js-move move" > </p>
    <p class="js-score"> </p>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.Ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    "class="reset-score-button js-reset-score-button">Reset Score</button>

  
  <script src="script.js"></script>
</body>
</html>
